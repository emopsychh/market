[tool.black]
line-length = 100
target-version = ["py311", "py312", "py313", "py314"]
skip-string-normalization = true

[tool.ruff]
line-length = 100
target-version = "py311"
exclude = [
  "migrations",
  "__pycache__",
]

[tool.ruff.lint]
select = [
  "E",
  "F",
  "W",
  "I",
]
ignore = [
  "E501",
]

[tool.ruff.lint.isort]
known-first-party = ["config", "orders", "products", "users"]
