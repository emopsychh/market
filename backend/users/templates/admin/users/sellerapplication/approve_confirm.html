{% extends "admin/base_site.html" %}
{% block title %}Одобрение заявки{% endblock %}
{% block content %}
<h1>Одобрить заявку #{{ app.pk }}?</h1>
<p><strong>{{ app.display_name }}</strong> — {{ app.user.email }}</p>
<form method="post">{% csrf_token %}
  <div class="submit-row">
    <input type="submit" value="Одобрить">
    <a href="{% url 'admin:users_sellerapplication_changelist' %}">Отмена</a>
  </div>
</form>
{% endblock %}
